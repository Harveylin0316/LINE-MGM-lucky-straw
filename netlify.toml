[build]
  functions = "netlify/functions"
  publish = "public"
  command = "npm ci"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[functions."server"]
  external_node_modules = ["pg", "ejs"]
  included_files = ["views/**", "public/**", "src/views/**", "src/public/**", "server.js"]

[functions."scheduled-broadcast-runner"]
  schedule = "*/5 * * * *"

# 每月 1 號 03:30 UTC = 台北 11:30，觸發訂位熱榜推播
[functions."scheduled-monthly-leaderboard"]
  schedule = "30 3 1 * *"

[[redirects]]
  from = "/style.css"
  to = "/style.css"
  status = 200

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
